name: Sync Upstream Man Pages

on:
  schedule:
    # Every Monday at 6:00 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clone upstream aerc
        run: |
          git clone --depth 1 https://git.sr.ht/~rjarry/aerc upstream/aerc

      - name: Check for changes
        id: check
        run: |
          # Generate checksums of upstream scdoc files
          sha256sum upstream/aerc/doc/*.scd | sort > /tmp/new-checksums

          # Compare with stored checksums
          if [ -f .upstream-checksums ]; then
            if diff -q .upstream-checksums /tmp/new-checksums > /dev/null 2>&1; then
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "No upstream changes detected."
              exit 0
            fi
          fi

          echo "changed=true" >> $GITHUB_OUTPUT

          # Get upstream version
          cd upstream/aerc
          UPSTREAM_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          echo "version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT

      - name: Convert scdoc files
        if: steps.check.outputs.changed == 'true'
        run: pnpm convert:all

      - name: Update checksums
        if: steps.check.outputs.changed == 'true'
        run: |
          sha256sum upstream/aerc/doc/*.scd | sort > .upstream-checksums
          echo "${{ steps.check.outputs.version }}" > .upstream-version

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update reference docs from upstream ${{ steps.check.outputs.version }}"
          branch: auto/sync-upstream
          title: "Update reference docs from upstream ${{ steps.check.outputs.version }}"
          body: |
            Automated sync from upstream aerc repository.

            **Version:** ${{ steps.check.outputs.version }}

            Please review the converted markdown for any formatting issues.
          labels: auto-sync
